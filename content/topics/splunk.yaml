id: splunk
order: 1
title: Splunk
tagline: From zero to a confident Splunk user — searching, SPL, dashboards, alerts, data onboarding and admin basics.
status: ready
color: "#d9480f"
modules:
  - title: Foundations
    steps:
      - slug: what-is-splunk
        id: oimvxIT37v3m
        title: "What Splunk actually is"
        goal: "Explain in your own words what Splunk does, what problems it solves, and how it differs from a database or a monitoring tool."
        prompt: |
          I'm starting a structured learning path for Splunk and I know nothing about it yet.
          Act as my instructor. Explain:
          1) What Splunk is and the core problem it solves (machine data: logs, metrics, events).
          2) Three concrete real-world scenarios where teams use it (security, IT ops, business analytics) — one short story each.
          3) How it differs from a relational database and from a tool like Grafana/Prometheus.
          Keep it under 500 words, no marketing language.
          Then ask me 2 short questions to check I understood, one at a time, and wait for my answer before continuing.
        quiz_prompt: |
          Quiz me on "what Splunk is": 3 questions, one at a time. Include one scenario question
          ("a team wants to do X — is Splunk a good fit, why/why not?"). Grade each answer briefly.
        practice: "Write one paragraph (anywhere — notes app is fine) describing a problem from your own work or home lab that Splunk could solve."

      - slug: core-concepts
        id: lWb6IszhZ7Od
        title: "Events, indexes, sourcetypes — the data model"
        goal: "Know what an event, index, sourcetype, source and host are, and understand why Splunk applies schema at search time."
        prompt: |
          I'm learning Splunk. I know roughly what it's for, but not how it organizes data.
          Act as my instructor and teach me the five core concepts: event, index, sourcetype, source, host.
          For each: a one-line definition plus a concrete example using an nginx access log line.
          Then explain "schema on read / schema at search time" and why it's a big deal compared to
          defining table columns upfront in a database.
          Finally ask me 3 check questions one at a time (e.g. "an nginx log and a firewall log arrive —
          same index or different? same sourcetype or different?") and wait for my answers.
        quiz_prompt: |
          Quiz me on Splunk's data model (event, index, sourcetype, source, host, schema-on-read).
          5 questions, one at a time, mostly scenario-based. Grade each answer and correct me where I'm wrong.
        practice: "Sketch (on paper) how you'd organize three data sources — web server logs, Linux syslog, application JSON logs — into indexes and sourcetypes."

      - slug: set-up-a-sandbox
        id: aMBWGbsJjS4Q
        title: "Set up your own Splunk sandbox"
        goal: "Have a running Splunk instance you can experiment in — Docker is the fastest route — and know what the free license does and doesn't allow."
        prompt: |
          I'm learning Splunk and need a personal sandbox. I have Docker available.
          Act as my hands-on guide:
          1) Give me a single docker run (or docker compose) command for the official splunk/splunk image,
             with the web UI on port 8000 and an admin password I set myself.
          2) Explain what each option in the command does.
          3) Explain the free/trial license limits in two sentences.
          4) Tell me how to verify it's healthy and log in for the first time.
          If something might go wrong (slow first start, low RAM), warn me up front. I'll run the
          commands and report back — wait for me and help me troubleshoot before moving on.
        quiz_prompt: |
          Ask me 3 quick questions about my new Splunk sandbox: where does the web UI live, what license
          is it running, and what's one limitation I should remember. One at a time, grade my answers.
        practice: "Actually run the container, log in at http://localhost:8000, and find the search bar. Don't continue the path until this works."

      - slug: first-searches
        id: f2nFFaRB4LNr
        title: "Your first searches"
        goal: "Run searches in the Search & Reporting app, use the time range picker, and explore Splunk's own _internal index as free sample data."
        prompt: |
          My Splunk sandbox is running and I'm in the Search & Reporting app for the first time.
          Act as my instructor:
          1) Explain the anatomy of the search screen: search bar, time range picker, events tab, fields sidebar.
          2) Have me run: index=_internal — and explain what this index is and why it's perfect for practice.
          3) Show me how to narrow by time (last 15 minutes) and why time range is the single most
             important performance habit in Splunk.
          4) Have me click a field in the sidebar and explain what I'm seeing.
          Give me the searches one at a time, wait for me to run each and tell you what I see.
        quiz_prompt: |
          Quiz me on Splunk search basics: 4 questions, one at a time — include one about why
          searching "All time" is a bad habit and one about what the fields sidebar shows.
        practice: "Run index=_internal over the last 15 minutes, find the sourcetype field in the sidebar, and list which sourcetypes your own instance generates."

  - title: SPL Fundamentals
    steps:
      - slug: search-language-basics
        id: iVjfnXYSA91K
        title: "SPL building blocks: keywords, operators, pipes"
        goal: "Combine keywords, field=value pairs, AND/OR/NOT and wildcards, and understand the pipe as SPL's core idea."
        prompt: |
          I'm learning SPL (Splunk's search language). I can run basic searches on index=_internal.
          Act as my instructor and teach me the building blocks:
          1) Bare keywords vs field=value searches — when does each match?
          2) Boolean operators AND/OR/NOT (and that AND is implicit), parentheses, wildcards.
          3) The pipe | — explain it with a Unix-pipeline analogy: search first, then transform.
          Use index=_internal in every example so I can run them immediately.
          Give me 3 exercises of increasing difficulty ("find all ERROR events from sourcetype X in the
          last hour", etc.), one at a time, and check my SPL before giving me the next one.
        quiz_prompt: |
          Quiz me on SPL basics: 5 questions, one at a time. Mix "what does this search return?" with
          "write SPL that does X". Grade strictly and show the idiomatic version of my answers.
        practice: "On your sandbox, write one search combining a keyword, a field=value filter and NOT — and confirm the result set changes as you expect."

      - slug: working-with-fields
        id: d63wevwDfkIg
        title: "Working with fields: table, rename, dedup"
        goal: "Shape raw events into readable output with fields, table, rename and dedup, and understand auto-extracted vs manual fields."
        prompt: |
          I'm learning SPL. I can filter events with keywords, field=value and booleans.
          Act as my instructor and teach me how to shape results:
          1) How Splunk auto-extracts fields at search time (key=value pairs, JSON) and when it can't.
          2) The commands fields, table, rename, dedup — one runnable index=_internal example each,
             and the difference between fields (performance) and table (presentation).
          3) A combined example building a clean table from raw events.
          Then give me 2 exercises, one at a time, and review my SPL before continuing.
        quiz_prompt: |
          Quiz me on field manipulation in SPL (fields vs table, rename, dedup, auto-extraction):
          4 questions one at a time, at least two "write the SPL" tasks. Grade my answers.
        practice: "Build a deduplicated table of sourcetype, host and log_level from index=_internal."

      - slug: stats-essentials
        id: cT8c0V2yUDzb
        title: "Aggregating with stats"
        goal: "Use stats with count, sum, avg, min/max, distinct_count and 'by' clauses — the single most important SPL command."
        prompt: |
          I'm learning SPL and comfortable filtering and tabling events. Now teach me stats —
          I'm told it's the most important command in Splunk.
          Act as my instructor:
          1) The mental model: stats collapses events into a summary table (compare to SQL GROUP BY).
          2) Functions count, dc, sum, avg, min, max, values, latest — short runnable
             index=_internal examples.
          3) Single and multiple "by" fields.
          4) The classic pattern: stats count by X | sort -count.
          Then give me 3 exercises of increasing difficulty, one at a time, and review each answer.
        quiz_prompt: |
          Quiz me on the stats command: 5 questions one at a time. Include one trap question about
          what happens to fields that aren't in the stats output, and two "write the SPL" tasks.
        practice: "Find the top 5 noisiest sourcetypes in your _internal index by event count, using stats and sort — not the top command."

      - slug: sorting-top-rare
        id: qvIafOPvJSyq
        title: "sort, top and rare"
        goal: "Order results with sort and get instant frequency analysis with top and rare — and know when to use them vs stats."
        prompt: |
          I'm learning SPL and just learned stats. Teach me sort, top and rare:
          1) sort with ascending/descending and multiple fields.
          2) top and rare: what they output (count + percent), their limit option, and the "by" clause.
          3) When top is enough vs when I should reach for stats — concrete guidance.
          Runnable index=_internal examples for everything. Then 2 exercises one at a time with review.
        quiz_prompt: |
          Quiz me on sort/top/rare: 4 questions one at a time, including one asking me to produce the
          same output with top and with stats+sort, and explain which I'd use when.
        practice: "Use rare on the sourcetype field of _internal — does anything surprising show up at the bottom of your instance's activity?"

      - slug: eval-essentials
        id: smG0Lntrfd26
        title: "Computing new fields with eval"
        goal: "Create calculated fields with eval: arithmetic, string functions, if() and case() conditionals."
        prompt: |
          I'm learning SPL — comfortable with filtering, stats, sort. Now teach me eval:
          1) The mental model: eval adds/overwrites a field per event.
          2) Arithmetic (bytes to MB), string functions (lower, substr, replace, the . concat operator).
          3) Conditionals: if() and case() — e.g. classify response times into fast/ok/slow buckets.
          4) eval feeding into stats: eval first, aggregate after.
          Runnable index=_internal examples. Then 3 exercises one at a time; review my SPL each time
          and show the idiomatic form if mine is clumsy.
        quiz_prompt: |
          Quiz me on eval: 5 questions one at a time, mostly "write the eval expression for X".
          Include one combining eval and stats. Grade strictly.
        practice: "In _internal, create a field that buckets events by the length of their _raw text (short/medium/long) and count events per bucket."

      - slug: working-with-time
        id: bE35bsuyyNpn
        title: "Time mastery: _time, relative ranges, strftime"
        goal: "Treat _time as the field it is — use relative-time modifiers with snap-to, format and parse times with strftime/strptime, bucket with bin, and understand why timezone/parsing mistakes put events in the wrong place."
        prompt: |
          I'm learning SPL and want to really understand time in Splunk — it keeps tripping me up.
          Act as my instructor, with runnable index=_internal examples:
          1) _time is epoch seconds on every event; the time range picker just sets earliest/latest.
          2) Relative-time syntax: -24h, -7d, now — and the part people miss, snap-to with @:
             -7d@d (7 days ago, snapped to midnight), @w0 (start of week). Show how @ changes results.
          3) Humanise and parse: strftime(_time,"%Y-%m-%d %H:%M") to format; strptime("...","...") to turn
             a string back into epoch. Verified example:
             index=_internal | eval when=strftime(_time,"%Y-%m-%d %H:%M") | table _time when | head 5
          4) Bucket time yourself with bin (what timechart does under the hood). Verified example:
             index=_internal | bin _time span=1h | stats count by _time
          5) Timezones: _time is stored in UTC and rendered in the user's TZ; a mismatch makes events
             look hours off.
          Then 2 exercises one at a time.
          The field gotcha to teach me: when timestamp parsing is misconfigured at onboarding, every
          event gets stamped with its INGEST time instead of the real one — so they all pile up at
          "now" and time-based search becomes useless. (I'll meet this again in the parsing step.)
        quiz_prompt: |
          Quiz me on time in Splunk: 5 questions one at a time. Include one on what -7d@d means vs -7d,
          one strftime/strptime task, and one "why are my events showing up in the future?" scenario.
        practice: "On index=_internal, chart event volume per hour for the last 24h using bin _time span=1h and stats, then identify your instance's quietest hour."

  - title: Fields & Extraction
    steps:
      - slug: regex-for-splunk
        id: tesrYlGJTy40
        title: "Regex you actually need in Splunk"
        goal: "Read and write the regex Splunk uses — character classes, quantifiers, anchors, groups and named capture — and know the three places regex shows up: rex, where match(), and the regex command."
        prompt: |
          I'm learning SPL and keep hitting regex. Teach me the practical subset, Splunk-flavoured.
          Act as my instructor:
          1) The 20% of regex that covers 90% of Splunk work: literals and ., the classes \d \w \s,
             custom classes [...], quantifiers * + ? {n,m}, anchors ^ $, alternation |, groups ( ),
             and — most important in Splunk — NAMED capture (?<name>...).
          2) The three places regex appears: the rex command (to EXTRACT), where match(field,"regex")
             and the regex command (to FILTER), and replace()/rex sed-mode (to REWRITE).
          3) Greedy vs lazy (.* vs .*?) — explain why this is the single most common rex bug, with a
             before/after on a real line.
          Use this real splunkd_access line as the running example:
          127.0.0.1 - splunk-system-user [21/Jun/2026:18:27:23.939 +0200] "GET /services/... HTTP/1.0" 200 3 "-" "splunk-sdk-python/2.0.2" - - - 4ms
          Have me write a regex that captures the trailing response time (the "4ms"). Give me 2 more
          exercises one at a time and check each before continuing.
          One field note: Splunk's regex is PCRE, and you should always test a pattern live with the
          rex command before baking it into props.conf — a wrong pattern there fails silently and
          extracts nothing, with no error.
        quiz_prompt: |
          Quiz me on Splunk regex: 5 questions one at a time. Mix "what does this pattern match?" with
          "write the pattern for X", and include one greedy-vs-lazy trap where .* captures too much.
          Grade strictly and show the idiomatic pattern.
        practice: "On index=_internal sourcetype=splunkd_access, write a regex that captures the 3-digit HTTP status code, then confirm it with: rex \"HTTP/\\d\\.\\d\\\" (?<status>\\d{3})\" | stats count by status."

      - slug: field-extraction-with-rex
        id: mzHFCgvWPTQo
        title: "Extracting fields at search time with rex"
        goal: "Use the rex command to pull new fields out of _raw at search time — named groups, the field= option, max_match for multivalue, and sed mode for masking — and understand why this beats reindexing."
        prompt: |
          I can read Splunk regex now. Teach me the rex command hands-on, with searches I can run on
          index=_internal in my sandbox.
          Act as my instructor and give me each example to run, waiting for my result:
          1) rex anatomy: `rex field=_raw "(?<name>pattern)"` (field defaults to _raw).
          2) A verified single-field extraction — average response time of the management port:
             index=_internal sourcetype=splunkd_access | rex "(?<resp_ms>\d+)ms$" | stats avg(resp_ms) as avg_ms max(resp_ms) as max_ms
             Explain that resp_ms arrives as a string and becomes numeric when used in avg().
          3) Several fields in one rex — method and path from the request line:
             ... | rex "\"(?<method>[A-Z]+) (?<uri_path>[^ ?]+)" | stats count by method
          4) max_match=0 to capture repeating matches into a multivalue field; and rex mode=sed to
             mask/redact (e.g. replace digits with X).
          5) Why rex matters: it's search-time and retroactive — you extract fields from data already
             indexed, with no reindex. Tie this back to schema-on-read.
          The catch to teach me: a rex field exists only for THAT search. Making it permanent is the
          next step.
        quiz_prompt: |
          Quiz me on rex: 5 questions one at a time. At least two are "write the rex for X" on a given
          line; include one on what max_match=0 produces and one on sed mode. Grade strictly.
        practice: "On index=_internal sourcetype=splunkd, extract the log level and component with one rex and summarise them — verified pattern: rex \"\\d{2}:\\d{2}:\\d{2}\\.\\d+ [+-]\\d{4} (?<level>[A-Z]+)\\s+(?<component>\\w+)\" | stats count by level, component | sort -count."

      - slug: persistent-extractions
        id: ldE1Ken0WhTy
        title: "Making extractions permanent (Field Extractor, props/transforms)"
        goal: "Turn a working rex into a reusable, automatic field extraction — via the Field Extractor UI and via props.conf/transforms.conf — and know when to use inline EXTRACT vs a REPORT transform."
        prompt: |
          I can extract fields with rex, but I'm repeating the same rex in every search. Teach me how
          to make an extraction permanent so the field appears automatically. I'll follow along in my
          sandbox — give me the steps in stages and wait after each.
          Act as my guide:
          1) The problem and the payoff: define the extraction once against a sourcetype, and every
             future search on that sourcetype gets the field for free — still search-time, no reindex.
          2) The Field Extractor (UI): from a search result, click a field value → Extract Fields, pick
             regex or delimiter, name the field, set permissions, save it to the sourcetype. Walk me
             through extracting resp_ms from splunkd_access this way.
          3) What it writes under the hood: props.conf `EXTRACT-name = <regex>` (inline, simple,
             self-contained) vs `REPORT-name = <stanza>` pointing at a transforms.conf stanza (for
             reuse, delimiter-based, or multi-field/shared extractions). When to choose each.
          4) Scope and gotchas: the extraction must target the correct sourcetype; KV_MODE/`| extract`
             handles automatic key=value pairs; permissions decide who sees the field.
        quiz_prompt: |
          Quiz me on persistent extractions: 4 questions one at a time — EXTRACT vs REPORT, does it
          reindex data, where it runs (parse-time or search-time), and which sourcetype a given
          extraction applies to. Grade my reasoning.
        practice: "Use the Field Extractor to create a permanent resp_ms field on the splunkd_access sourcetype, then run a brand-new search with NO rex and confirm resp_ms is already there."

      - slug: multivalue-fields
        id: ezFI6c9jQ7hK
        title: "Multivalue fields: split, mvexpand, mvcount"
        goal: "Create, inspect, expand and recombine fields that hold multiple values — split/makemv/max_match, mvcount/mvindex/mvfilter, mvexpand, and mvjoin — and avoid the classic 'stats by a multivalue field' surprise."
        prompt: |
          Teach me multivalue fields in SPL, with runnable index=_internal examples.
          Act as my instructor, one example at a time:
          1) What a multivalue field is — e.g. the output of stats values(), or anything you split().
          2) Creating them: eval x=split(field,"delim"), the makemv command, and rex max_match=0.
          3) Inspecting: mvcount() (how many), mvindex() (pick one), mvfilter()/mvfind() (subset/search).
          4) Expanding to one event per value with mvexpand — and the memory caveat on large sets.
          5) Recombining: mvjoin(field,"delim") and nomv.
          Verified running example to walk me through — split a request path into its segments and
          measure depth:
          index=_internal sourcetype=splunkd_access | rex "\"(?<method>[A-Z]+) (?<uri_path>[^ ?]+)" | eval segments=split(uri_path,"/") | eval seg_count=mvcount(segments) | stats avg(seg_count) as avg_segments max(seg_count) as max_segments
          Then give me 2 exercises one at a time.
          The trap to teach me: `stats count by mv_field` counts each event once against ALL its values,
          whereas mvexpand first then stats gives one row per value — different answers, pick on purpose.
        quiz_prompt: |
          Quiz me on multivalue fields: 4 questions one at a time — mvcount vs mvexpand, when to expand,
          how to recombine, and one scenario where stats-by-mv vs mvexpand-then-stats differ. Grade me.
        practice: "On index=_internal sourcetype=splunkd_access, find the request with the deepest URI path: split the path on '/', count segments with mvcount, and sort to the top."

  - title: Intermediate SPL
    steps:
      - slug: timechart
        id: uuDY6nxbumeG
        title: "Time series with timechart"
        goal: "Turn events into time series with timechart, control granularity with span, and split series with a by-field."
        prompt: |
          I'm learning SPL — solid on stats and eval. Teach me timechart:
          1) How it differs from stats (time becomes the x-axis automatically).
          2) span= for granularity and what happens if I omit it.
          3) Splitting into multiple series with "by", and the limit/useother options.
          4) Where to click to see the chart instead of the table.
          Runnable index=_internal examples (e.g. timechart count by sourcetype). Then 2 exercises
          one at a time with review.
        quiz_prompt: |
          Quiz me on timechart: 4 questions one at a time. Include one "stats or timechart?" scenario
          and one about choosing a sensible span for a 7-day search.
        practice: "Chart your _internal event volume per sourcetype over the last 24 hours with a 1-hour span. Find your instance's quietest hour."

      - slug: eventstats-streamstats
        id: eZ82QXIgXuXl
        title: "eventstats and streamstats"
        goal: "Add aggregate context to events without collapsing them (eventstats) and compute running/windowed values (streamstats)."
        prompt: |
          I'm learning SPL — comfortable with stats and timechart. Teach me eventstats and streamstats:
          1) eventstats: like stats, but the aggregate is attached to every event instead of collapsing
             them. Example use: "show events whose size is above the average".
          2) streamstats: running aggregates in event order; window= and current= options.
             Example use: running count per host, or comparing each event to the previous one.
          3) A clear side-by-side: same data through stats vs eventstats vs streamstats.
          Runnable index=_internal examples. Then 2 exercises one at a time, review my answers.
        quiz_prompt: |
          Quiz me on stats vs eventstats vs streamstats: 4 scenario questions one at a time
          ("I need X — which command?"), then one "write the SPL" task. Grade my reasoning, not just the answer.
        practice: "In _internal, find events whose _raw length is more than twice the average length for their sourcetype — this needs eventstats."

      - slug: lookups
        id: oBZQSHofxqdZ
        title: "Enriching data with lookups"
        goal: "Create a CSV lookup, enrich search results with the lookup command, and know when automatic lookups make sense."
        prompt: |
          I'm learning SPL — good with stats and eval. Teach me lookups:
          1) The concept: joining a small reference table (CSV) onto events at search time —
             e.g. mapping status codes to descriptions, hosts to owners.
          2) Walk me through creating a small CSV lookup in the UI (Settings → Lookups), step by step.
          3) The lookup command syntax and the inputlookup/outputlookup commands.
          4) Automatic lookups in one paragraph — what they are and one caution.
          I'll follow along in my sandbox; give me the steps in stages and wait for my confirmation
          after each stage.
        quiz_prompt: |
          Quiz me on lookups: 4 questions one at a time — include one about lookup vs join,
          and one "design question": what lookup table would help in a given scenario.
        practice: "Create a CSV mapping your _internal sourcetypes to a friendly label and a category, upload it as a lookup, and enrich a stats result with it."

      - slug: subsearches-and-joins
        id: yTmrh4kwAHbm
        title: "Subsearches, join — and why stats usually wins"
        goal: "Use subsearches and join when needed, know their hard limits, and recognize the stats-based patterns that replace them."
        prompt: |
          I'm learning SPL at intermediate level. Teach me subsearches and join — including why
          experienced Splunk users avoid them:
          1) Subsearch mechanics: [ ] runs first, results become filter conditions. One runnable example.
          2) The hard limits (result caps, time limits) and how they silently truncate.
          3) join: syntax, inner/outer — and its limits.
          4) The important part: show the idiomatic stats alternative. Take one concrete "correlate
             two sourcetypes" problem and solve it twice: with join, then with
             (sourcetype=A OR sourcetype=B) | stats values(...) by common_field. Explain why the
             second scales and the first breaks.
          Then give me one correlation exercise and review whether I chose the right approach.
        quiz_prompt: |
          Quiz me on subsearches and join: 4 questions one at a time. At least one must give me a
          join-based search and ask me to rewrite it with stats. Grade the rewrite strictly.
        practice: "Write a correlation search across two _internal sourcetypes using the stats pattern (no join). Confirm the same answer a join would give."

      - slug: transaction-vs-stats
        id: oyleX19IJTay
        title: "Grouping events: transaction vs stats"
        goal: "Group related events into sessions with transaction (maxspan, maxpause, startswith/endswith), and know why stats-by-key is the faster default and when transaction is genuinely the right tool."
        prompt: |
          I'm at intermediate SPL. Teach me transaction and, honestly, when NOT to use it.
          Act as my instructor with runnable index=_internal examples:
          1) What transaction does: collapses events sharing a field into one multivalue event with
             eventcount and duration. The controls: maxspan, maxpause, startswith/endswith.
          2) Verified example — group access-log bursts by client with a 2-second gap:
             index=_internal sourcetype=splunkd_access | transaction clientip maxpause=2s | stats count as transactions avg(eventcount) as avg_events
             (on my instance this returns ~26 transactions.)
          3) Why stats is usually better: transaction is memory-heavy and silently caps on big data.
             For "duration and count per key", stats does it cheaper:
             index=_internal sourcetype=splunkd_access | stats range(_time) as duration count by clientip
          4) When transaction is genuinely right: you need start/end conditions or pause-based
             sessionization that stats can't express.
          Then give me one grouping problem and have me solve it both ways and compare.
        quiz_prompt: |
          Quiz me on transaction vs stats: 4 questions one at a time. Include one where I must rewrite a
          transaction as stats, and one scenario where transaction is actually the correct choice.
        practice: "On index=_internal sourcetype=splunkd_access, count per-client sessions two ways — transaction clientip maxpause=2s, then a stats equivalent — and compare the numbers and the runtimes."

  - title: Knowledge Objects
    steps:
      - slug: eventtypes-and-tags
        id: gqRcsH6FtDQZ
        title: "Categorizing events: eventtypes and tags"
        goal: "Label events by meaning with eventtypes (a saved condition becomes a category) and tags (a label on a field=value), so you search by intent — eventtype=error, tag=production — instead of brittle raw strings."
        prompt: |
          Teach me eventtypes and tags in Splunk — the start of normalization. I'll follow along on
          index=_internal in my sandbox, in stages, waiting for me after each.
          Act as my guide:
          1) Eventtype: a saved search condition that becomes a label on every matching event. Define
             one — e.g. "splunkd_error" = (index=_internal log_level=ERROR) — then I can just search
             eventtype=splunkd_error.
          2) Tags: a label attached to a specific field=value pair (e.g. tag a host as "webserver" and
             "production"), so tag=webserver finds it regardless of the hostname.
          3) Why both matter: they decouple WHAT you mean from HOW each source spells it, so one query
             spans heterogeneous data — the idea CIM scales up later.
          4) Where they live (Settings → Event types / Tags) and how permissions/scope work.
        quiz_prompt: |
          Quiz me on eventtypes and tags: 4 questions one at a time — eventtype vs tag, when to use each,
          search-time cost, and a scenario mapping a messy multi-source search to eventtypes/tags.
        practice: "Create an eventtype for _internal warnings (log_level=WARN) named like splunkd_warn, then confirm eventtype=splunkd_warn returns those events."

      - slug: macros
        id: sBD1FLq7W8j8
        title: "Reusable SPL with search macros"
        goal: "Factor repeated or complex SPL into named macros with arguments, called with backticks, so a fragment is defined once, reused everywhere, and fixed in one place."
        prompt: |
          Teach me search macros — I'm tired of pasting the same SPL everywhere.
          Act as my instructor, with examples I can build in my sandbox:
          1) The problem macros solve: duplicated SPL that you have to fix in ten places.
          2) A macro is named SPL you call with backticks: `mymacro` or `mymacro(arg)`.
          3) Define one in Settings → Advanced search → Search macros — e.g. noisy_sourcetypes =
             (index=_internal | stats count by sourcetype | sort -count) — then call it with `noisy_sourcetypes`.
          4) Arguments: add a count arg and use $count$ inside, validation expressions.
          Walk me through creating and calling one, waiting for my result.
          The gotcha to teach me: macros expand at PARSE time, so a slow macro hides its cost — expand
          it in the search bar (Ctrl-Shift-E) or read the Job Inspector to see what really ran.
        quiz_prompt: |
          Quiz me on macros: 4 questions one at a time — what backticks do, when expansion happens,
          how arguments substitute, and how you'd debug a macro that returns surprising results.
        practice: "Define a macro top_sourcetypes(count) that returns the top N noisy _internal sourcetypes, then call it as `top_sourcetypes(5)` and `top_sourcetypes(10)`."

      - slug: calculated-fields-and-aliases
        id: thJMVQrG9UgZ
        title: "Calculated fields and field aliases"
        goal: "Make eval expressions and field renames automatic — calculated fields (an eval that always runs) and field aliases (unify differently-named fields) — so derived/normalized fields exist without retyping eval, the groundwork for CIM."
        prompt: |
          Teach me calculated fields and field aliases — I keep retyping the same eval and rename.
          Act as my instructor:
          1) Calculated field: an eval that runs automatically at search time for a sourcetype
             (props.conf EVAL-name = expr). E.g. always derive resp_seconds = resp_ms / 1000 on
             splunkd_access, so resp_seconds is just there.
          2) Field alias: map differently-named fields to one canonical name (src_ip, clientip, ip → src).
             This is the literal foundation of CIM normalization.
          3) Where to set them (Settings → Fields → Calculated fields / Field aliases) and scoping to
             the right sourcetype.
          4) The search-time order of operations: aliases → extractions → calculated fields → lookups,
             and why it matters when one depends on another.
          Walk me through creating one calculated field in stages.
          The gotcha to teach me: an alias is automatic and permanent whereas rename is per-search; and
          calculated fields can't freely reference each other, so order matters.
        quiz_prompt: |
          Quiz me on calculated fields and aliases: 4 questions one at a time — alias vs rename,
          calculated field vs inline eval, the order of operations, and one scenario choosing which to use.
        practice: "Create a calculated field resp_seconds = resp_ms/1000 on the splunkd_access sourcetype (after you've made resp_ms permanent), and confirm resp_seconds appears with no eval in your search."

  - title: Data Models, CIM & Acceleration
    steps:
      - slug: data-models-and-pivot
        id: eNRRNInUz6h0
        title: "Data models and Pivot"
        goal: "Understand a data model as a curated, hierarchical schema over raw data, use Pivot to build reports without SPL, and know that acceleration is what makes models fast at scale."
        prompt: |
          Teach me data models and Pivot in Splunk.
          Act as my instructor:
          1) A data model is a curated object hierarchy (e.g. Web > request > successful requests) that
             maps messy raw fields onto a consistent schema, built once by a knowledge manager.
          2) Pivot: a point-and-click reporting UI on top of a data model — people who don't know SPL
             build tables and charts from it.
          3) Acceleration: a model can be accelerated (a background tsidx summary) so Pivot and tstats
             run fast over huge volumes — this sets up the next step.
          4) The datamodel and pivot commands for driving a model from SPL.
          Be honest with me: my sandbox may not have any data models yet, so treat this as conceptual
          and have me inspect whatever exists. Then ask me 3 check questions one at a time.
          The gotcha to teach me: acceleration costs disk and a backfill, so you only accelerate models
          you actually query often.
        quiz_prompt: |
          Quiz me on data models and Pivot: 4 questions one at a time — what a data model is for, Pivot
          vs raw SPL, what acceleration buys you and what it costs, and who builds vs consumes a model.
        practice: "In Settings → Data models, open any existing model (or a CIM model if an add-on is installed) and write down its root object plus two of its constraints."

      - slug: tstats-and-acceleration
        id: kyndvUckoQBv
        title: "Fast analytics with tstats"
        goal: "Run searches 10–100x faster with tstats by reading indexed/accelerated metadata instead of raw events, and know exactly what it can and can't operate on."
        prompt: |
          Teach me tstats — I want the fast-search command.
          Act as my instructor with runnable examples:
          1) Why it's fast: tstats reads tsidx (index-time metadata and accelerated data-model summaries)
             instead of scanning raw events.
          2) Verified example (indexed fields work without any data model):
             | tstats count where index=_internal by sourcetype | sort -count
          3) The hard limit: tstats only sees indexed fields (index, sourcetype, source, host, _time) or
             accelerated data-model fields — NOT arbitrary search-time-extracted fields.
          4) prestats=t feeding timechart, and | tstats ... FROM datamodel=<name> for accelerated models;
             with a data model, summariesonly=true restricts results to the accelerated range only.
          5) When to reach for it: dashboard panels and wide time ranges where stats is too slow.
          Then have me convert one of my earlier stats searches to tstats and compare.
          Two gotchas to teach me:
          - Point tstats at a search-time field and it silently returns nothing — it's metadata-only, so
            it can't see fields that only exist after extraction.
          - tstats (and mstats/mpreview) can be disabled by "field filters" that an admin sets to protect
            sensitive data — so a tstats that works for an admin may return nothing for a restricted role.
        quiz_prompt: |
          Quiz me on tstats: 4 questions one at a time — why it's fast, which fields it can use, one
          "will this tstats work?" trap with a search-time field, and when you'd choose it over stats.
        practice: "Run index=_internal | stats count by sourcetype and | tstats count where index=_internal by sourcetype, confirm the counts match, and compare the two runtimes in the Job Inspector."

      - slug: cim-normalization
        id: xLaAEYITDyc0
        title: "Normalizing data with the CIM"
        goal: "Understand the Common Information Model — canonical field names plus tags — and why CIM-compliant data lets one search, dashboard or app (like Enterprise Security) work across many vendors."
        prompt: |
          Teach me the Common Information Model (CIM) and why people keep mentioning it.
          Act as my instructor:
          1) The problem CIM solves: every vendor names fields differently (src_ip vs source_address vs
             clientip). CIM defines canonical names (src, dest, action, user) and tags (authentication,
             network_traffic) so a query doesn't care about the source.
          2) How data becomes CIM-compliant: a TA (technology add-on) ships the field aliases, eventtypes
             and tags that map a source onto a CIM data model — exactly the knowledge objects I just learned.
          3) Why it matters: Enterprise Security and most premium apps assume CIM; a compliant source
             "just works" in them, a non-compliant one shows empty panels.
          4) The CIM add-on provides the models, and you validate compliance against them.
          Be honest that this is conceptual unless I install the CIM add-on. Ask me 3 check questions.
          The gotcha to teach me: "CIM-compliant" is a discipline, not a switch — partial compliance
          makes premium-app dashboards fail silently rather than error.
        quiz_prompt: |
          Quiz me on CIM: 4 questions one at a time — what problem it solves, which knowledge objects
          make data compliant, why ES needs it, and one scenario judging if a source is CIM-ready.
        practice: "Pick a source you'd onboard (e.g. your router or firewall logs) and write down which CIM fields (src, dest, action, user) you would map its raw fields onto."

  - title: Dashboards, Alerts & Reports
    steps:
      - slug: reports-saved-searches
        id: mwPbIEaonvAg
        title: "Saved searches and reports"
        goal: "Save a search as a report, schedule it, and understand how scheduled searches are the engine behind dashboards and alerts."
        prompt: |
          I'm learning Splunk — my SPL is decent. Teach me saved searches and reports:
          1) Saving a search as a report from the UI; report permissions (private vs app-shared).
          2) Scheduling: cron-style schedules, time ranges, and what "schedule window" does.
          3) Why scheduling matters: scheduled searches power alerts and dashboard panels — they're
             also a common cause of overloaded Splunk servers. Two sentences on being a good citizen.
          I'll follow along in my sandbox. Walk me through saving and scheduling one report on
          index=_internal, step by step, waiting for my confirmation.
        quiz_prompt: |
          Quiz me on reports and scheduling: 3 questions one at a time, including one about what
          happens when too many searches are scheduled at the same minute.
        practice: "Save a report 'Hourly event volume by sourcetype' on _internal and schedule it to run every hour."

      - slug: dashboards
        id: hUfQkfB6CbEV
        title: "Building your first dashboard"
        goal: "Build a dashboard with several panels in Dashboard Studio, and use a time range input that all panels obey."
        prompt: |
          I'm learning Splunk and want my first real dashboard. I'll use Dashboard Studio in my sandbox,
          with index=_internal as data.
          Act as my guide, stage by stage and wait for me after each:
          1) Create a new dashboard in Dashboard Studio (explain Studio vs Classic in two sentences).
          2) Panel 1: single value — total events in the selected time range.
          3) Panel 2: line chart — event volume over time by sourcetype (timechart).
          4) Panel 3: table — top 10 sourcetypes with counts.
          5) Add a time range input and wire every panel to it.
          Give me each panel's SPL and the clicks needed. If my panel shows something unexpected,
          help me debug before moving on.
        quiz_prompt: |
          Quiz me on dashboard concepts: 4 questions one at a time — panel data sources, inputs/tokens,
          Studio vs Classic, and one performance question about many panels sharing one base search.
        practice: "Add a fourth panel of your own choice to the dashboard. Anything — but you must write the SPL yourself."

      - slug: alerts
        id: iuTceCbPOwuM
        title: "Alerts that don't cry wolf"
        goal: "Create a scheduled alert with a sensible trigger condition, choose alert actions, and use throttling to prevent alert spam."
        prompt: |
          I'm learning Splunk — comfortable with SPL and reports. Teach me alerting:
          1) Anatomy of an alert: search + schedule + trigger condition + action.
          2) Scheduled vs real-time alerts — and why real-time is rarely the right answer.
          3) Trigger conditions (number of results, custom), and trigger "once" vs "for each result".
          4) Throttling: what it does and why every alert should consider it.
          5) Actions overview: email, webhook, run a script.
          Walk me through creating one alert in my sandbox on index=_internal log_level=ERROR,
          step by step, waiting for me. Then discuss: what makes an alert useful vs noisy —
          give me 3 principles.
        quiz_prompt: |
          Quiz me on alerting: 4 questions one at a time, including one scenario where I must choose
          schedule, trigger condition and throttle window for a given requirement — and defend the choice.
        practice: "Create an alert that fires when ERROR events in _internal exceed a threshold in 15 minutes, throttled to at most one notification per hour."

      - slug: search-performance
        id: p3TDCXutpJBN
        title: "Why is my search slow?"
        goal: "Read the Job Inspector, and apply the core performance habits: tight time ranges, early filtering, fields over table, avoiding leading wildcards."
        prompt: |
          I'm learning Splunk and my searches are getting slower as I get more ambitious.
          Act as my performance coach:
          1) How a search executes: indexers scan buckets by time, then filter, then transform —
             why the time range and the first pipe segment dominate cost.
          2) The Job Inspector: where to find it and the 2–3 numbers worth reading first.
          3) The habit list: filter early (index/sourcetype/keywords before first pipe), use fields
             early to cut data volume, avoid leading wildcards (*error), prefer tstats-able patterns —
             explain each in 2-3 sentences with a bad-vs-good SPL pair.
          Then show me one deliberately bad search on _internal and have me fix it step by step.
        quiz_prompt: |
          Quiz me on search performance: 4 questions one at a time. Show me slow SPL snippets and have
          me identify the problem and rewrite. Grade on whether my rewrite preserves the same results.
        practice: "Take your heaviest search from this path, open the Job Inspector, note the runtime, apply two optimizations, and measure again."

      - slug: summary-indexing
        id: c7ASlux3TLDL
        title: "Scaling reports: summary indexing and acceleration"
        goal: "Make long-range reports fast by pre-computing results — report acceleration, summary indexing (collect / si-commands), and data-model acceleration — and understand the freshness-vs-correctness trade-offs."
        prompt: |
          My dashboards over long time ranges are slow because they re-scan raw events every load.
          Teach me how to pre-compute. Act as my instructor:
          1) The problem: a "last 90 days" panel re-reading raw data on every refresh is wasteful.
          2) Three approaches and when each fits:
             - Report acceleration: a checkbox on a saved search; Splunk maintains a summary automatically.
               Easiest and safest when it applies.
             - Summary indexing: you schedule a search that writes condensed results into a summary
               index with collect (or the si-commands sistats/sitimechart that store partial aggregates
               you can re-aggregate later).
             - Data-model acceleration: from the earlier module, for tstats/Pivot.
          3) Walk me through enabling report acceleration on my hourly-volume report.
          The gotcha to teach me: summary indexing trades freshness and correctness for speed — a missed
          scheduled run leaves a GAP and a double-run causes OVERLAP (double-counting), so backfill and
          scheduling discipline matter. Report acceleration avoids most of that, so prefer it when it fits.
        quiz_prompt: |
          Quiz me on scaling reports: 4 questions one at a time — report acceleration vs summary indexing,
          what the si-commands store, the gap/overlap risk, and one scenario picking the right approach.
        practice: "Enable report acceleration on your 'Hourly event volume by sourcetype' report, then run it over the last 7 days and confirm it returns fast (and note in Job Inspector that it used the acceleration summary)."

  - title: Getting Data In
    steps:
      - slug: forwarders-and-inputs
        id: eCobBm2qcd1m
        title: "Forwarders and file inputs"
        goal: "Understand the Universal Forwarder's role, and configure a file monitor input so a log file flows into a chosen index."
        prompt: |
          I'm learning Splunk administration basics. My sandbox runs in Docker. Teach me how data
          gets in via forwarders and inputs:
          1) The Universal Forwarder: what it is, why production hosts run it instead of sending
             logs directly, and the UF → indexer flow (port 9997).
          2) inputs.conf: the [monitor://...] stanza — index, sourcetype, and what each line does.
          3) For my single-container sandbox: show me the simplest way to ingest a local file
             (UI: Settings → Add Data, or a monitor stanza) into a new index called "practice".
          4) How to create that index first, in the UI.
          Walk me through stages and wait for my confirmation; help me verify the data arrived
          with a search.
        quiz_prompt: |
          Quiz me on forwarders and inputs: 4 questions one at a time — UF vs heavy forwarder in one,
          a broken inputs.conf stanza to fix in another.
        practice: "Create an index named practice, ingest any local log file into it with sourcetype=mylog, and confirm with index=practice that events arrived with sensible timestamps."

      - slug: http-event-collector
        id: gcmBowRbqZ9t
        title: "HTTP Event Collector (HEC)"
        goal: "Enable HEC, create a token, and send events with curl — both the JSON /event endpoint and the /raw endpoint."
        prompt: |
          I'm learning Splunk data onboarding. Teach me the HTTP Event Collector hands-on:
          1) What HEC is for (apps/devices that can speak HTTP but can't run a forwarder).
          2) Enabling HEC and creating a token in the UI — step by step in my sandbox.
          3) Sending with curl: the /services/collector/event endpoint with a JSON body
             (event, sourcetype, index fields), and the /raw endpoint for plain text.
          4) The Authorization: Splunk <token> header, and the http vs https gotcha.
          Give me curl commands I can run, wait for my results, and help me verify the events in search.
        quiz_prompt: |
          Quiz me on HEC: 4 questions one at a time — endpoint differences, what's in the JSON envelope,
          token auth, and one debugging scenario (curl returns an error — walk through diagnosis).
        practice: "Create a HEC token and send 5 JSON events with curl carrying a custom field, then find them in search and confirm the field was extracted."

      - slug: parsing-and-onboarding
        id: uJV4hTMfAwXn
        title: "Parsing: timestamps, line breaking, sourcetypes"
        goal: "Understand what props.conf controls at parse time — timestamp extraction, line breaking, sourcetype definitions — and recognize broken onboarding when you see it."
        prompt: |
          I'm learning Splunk data onboarding beyond the happy path. Teach me parse-time configuration:
          1) What happens at parse time vs search time — which decisions are permanent
             (linebreaking, timestamps, index) and which are flexible (field extractions).
          2) props.conf essentials: TIME_PREFIX, TIME_FORMAT, MAX_TIMESTAMP_LOOKAHEAD,
             LINE_BREAKER, SHOULD_LINEMERGE, TRUNCATE — one line each on what they fix.
          3) The classic failure smells: events with the wrong year, multi-line stack traces split
             into many events, all events sharing the ingest time — what misconfiguration causes each.
          4) Why "define a proper sourcetype per format" is the core onboarding discipline.
          Then give me one broken-looking scenario at a time (3 total) and have me diagnose which
          setting is wrong.
        quiz_prompt: |
          Quiz me on parse-time vs search-time and props.conf: 5 questions one at a time, mostly
          diagnosis scenarios ("events look like X — what's misconfigured?"). Grade my reasoning.
        practice: "Ingest a small multi-line log sample (e.g. a Java stack trace) into your practice index and check: did line breaking and the timestamps come out right? If not, fix the sourcetype config."

      - slug: metrics-and-mstats
        id: h5zsZMmrKUtv
        title: "Metrics indexes and mstats"
        goal: "Understand metric indexes — a compact numeric time-series format — query them with mstats, and judge when a numeric stream should be a metric instead of a logged event."
        prompt: |
          Teach me Splunk metrics, as distinct from event logging.
          Act as my instructor:
          1) Metric vs event: a metric data point is just (timestamp, metric_name, value, dimensions) —
             far more compact and much faster for pure numeric time series than indexing a full text event.
          2) Metric indexes (datatype=metric) and how data gets in: HEC metrics endpoint, statsd, collectd.
          3) mstats — the metrics analogue of stats/tstats:
             | mstats avg(_value) WHERE metric_name="cpu.usage" by host span=1m
             explain _value, metric_name, and dimensions.
          4) When metrics win: high-cardinality CPU/memory/latency dashboards where you never need the
             original raw text.
          Be honest: my sandbox may have no metric index (my HEC health data went into an event index),
          so the mstats example may not run as-is — show me the shape and how I'd create a metric index.
          The gotcha to teach me: you can't grep a metric — there's no raw text to search — so only choose
          metrics when you are sure you'll never need the original event.
          A concrete tie-in for me: I push phone/watch sensor readings to Splunk via HEC today as events.
          Help me reason about which of those streams (heart rate, steps, GPS) would be better as metrics.
        quiz_prompt: |
          Quiz me on metrics: 4 questions one at a time — metric vs event trade-offs, what mstats does,
          when NOT to use metrics, and one scenario deciding metric-or-event for a given numeric stream.
        practice: "For your own sensor data (e.g. heart-rate from the health project), write two lines deciding whether it should be stored as metrics or as events, and justify the choice."

  - title: Administration & Automation
    steps:
      - slug: architecture-and-scaling
        id: o5b5jcCZfDg9
        title: "Splunk architecture: from one box to clusters"
        goal: "Describe the roles (search head, indexer, forwarder), when a deployment splits into tiers, and what indexer clustering and search head clustering add."
        prompt: |
          I'm learning Splunk administration. My only experience is a single-container sandbox.
          Teach me how real deployments are shaped:
          1) The three roles living inside my single instance: search head, indexer, forwarder duties.
          2) Why and when they split: data volume and search load — typical small/medium/large shapes.
          3) Indexer clustering: replication factor, search factor, the cluster manager — what failure
             it protects against, in plain words.
          4) Search head clustering: what it gives (HA for the UI/knowledge objects) and the deployer's job.
          5) One diagram in ASCII art of a mid-size deployment with the data flow arrows.
          Then ask me 3 questions one at a time, scenario-style ("company X has Y GB/day — what shape?").
        quiz_prompt: |
          Quiz me on Splunk architecture: 4 questions one at a time, including one on replication
          factor vs search factor and one deployment-sizing scenario. Grade my reasoning.
        practice: "Draw (paper is fine) the architecture you'd propose for a company ingesting 200 GB/day with 50 users — label every role and data flow."

      - slug: users-roles-troubleshooting
        id: jBh8ZhUvxPsg
        title: "Users, roles, and troubleshooting Splunk itself"
        goal: "Create users and roles with index-level restrictions, and know the first places to look when Splunk misbehaves: _internal, btool, and the monitoring console."
        prompt: |
          I'm finishing my Splunk learning path with admin survival skills. Teach me two things:

          A) Access control:
          1) Users, roles, capabilities — and how index access is restricted per role.
          2) Walk me through creating a "readonly_practice" role in my sandbox that can only
             search the practice index, plus a test user with that role. Step by step, wait for me.

          B) Troubleshooting Splunk itself:
          3) index=_internal as the first stop — which sourcetypes matter (splunkd, scheduler) and
             one example search for finding errors.
          4) btool: what "splunk btool props list --debug" answers (which config file wins).
          5) The Monitoring Console in two sentences.
          Then give me 2 troubleshooting scenarios one at a time and have me say where I'd look first.
        quiz_prompt: |
          Quiz me on Splunk admin basics: 4 questions one at a time — one role-design scenario,
          one "where do you look first" scenario, one btool question. Grade my answers.
        practice: "Create the readonly role and test user, log in as the test user in a private window, and confirm they can search practice but not _internal."

      - slug: rest-api-and-automation
        id: yqGBgnRnOOPI
        title: "Driving Splunk by API"
        goal: "Run searches and read/write configuration programmatically over the REST API on the management port (8089) and with the | rest command — the basis for automation, integration and dashboards-as-code."
        prompt: |
          Teach me how to drive Splunk programmatically, not just from the UI.
          Act as my instructor:
          1) The management API on port 8089 (https): everything the UI does is a REST call, authenticated
             with username/password or a token.
          2) Running a search by API: POST to /services/search/jobs (or the export endpoint), poll the job,
             fetch results as JSON. Show me a curl skeleton.
          3) The | rest SPL command to query Splunk's own state from a search, e.g.
             | rest /services/server/info | fields version, then | rest /services/data/indexes.
             Note this is a privileged generating command and may be restricted by role/capability.
          4) Where this goes: scheduled scripts, CI, the Python SDK, dashboards-as-code.
          Be honest: in some setups | rest is blocked by capability and will error — that's expected;
          the curl path against :8089 is the general one.
          The gotcha to teach me: the API uses the MANAGEMENT port (8089), not the web port (8000), and a
          self-signed cert means you need curl -k. People burn time pointing tools at the wrong port.
          A tie-in for me: this is the pull-side counterpart to how my home health pipeline already PUSHES
          via HEC — help me see where an API pull would fit.
        quiz_prompt: |
          Quiz me on the Splunk API: 4 questions one at a time — which port and why, how a search job runs
          over REST, what | rest is for and why it might be blocked, and one automation scenario.
        practice: "From a shell, run: curl -k -u admin:<pass> https://<your-splunk>:8089/services/server/info  and find the version and build in the response."

      - slug: apps-addons-and-deployment-server
        id: q2OrhkZp9Giq
        title: "Apps, add-ons (TAs) and the deployment server"
        goal: "Understand the app/add-on ecosystem — why you install a TA instead of hand-writing props.conf — and how the deployment server pushes apps and config to many forwarders centrally."
        prompt: |
          Teach me about Splunk apps, add-ons, and managing config at scale.
          Act as my instructor:
          1) Apps vs add-ons (TAs): an app is a packaged UI + config bundle; a technology add-on (TA) is
             config-only — the inputs, props/transforms and CIM mappings to onboard a source correctly.
             Both come from Splunkbase.
          2) Why TAs matter: for a known vendor you rarely hand-write props.conf — you install their TA and
             the parsing/field-extraction/CIM-compliance is done for you.
          3) The deployment server: the central manager that pushes apps and config to forwarders.
             serverclass.conf maps apps → groups of forwarders; each forwarder runs deploymentclient.conf,
             phones home, and pulls the apps assigned to it.
          4) Why it exists: managing config on 10 — or 10,000 — forwarders by hand is impossible.
          Be honest that this is conceptual on my single-instance sandbox; ask me 3 check questions.
          The gotcha to teach me: the deployment server distributes CONFIG/APPS, not data — data routing is
          outputs.conf / indexer discovery. People constantly confuse "deployment server" with data routing.
          A tie-in for me: I already have cisco and linux data indexed — point me at which Splunkbase TAs
          would have onboarded those sources for me with correct parsing and CIM fields.
        quiz_prompt: |
          Quiz me on apps/TAs and the deployment server: 4 questions one at a time — app vs TA, why install
          a TA, what the deployment server distributes (and what it does NOT), and a serverclass scenario.
        practice: "On Splunkbase, find the TA for a source you actually have (e.g. the Cisco or the *nix TA), and write down two things it would configure for you (an input, a sourcetype/parsing rule, or CIM fields)."
